<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zeros</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <style>
        body {
            margin: 0;
            background-color: #000;
            color: white;
            font-family: -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            justify-content: space-between;
            align-items: center;
        }
        .app-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
        }
        #bill {
            width: 85%;
            max-width: 400px;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(255,255,255,0.1);
            transition: transform 0.1s, box-shadow 0.3s;
        }
        .success-glow {
            transform: scale(1.05);
            box-shadow: 0 0 50px #30d158 !important;
        }
        .button-group {
            margin-top: 40px;
            display: flex;
            gap: 15px;
            width: 85%;
        }
        .pay-btn {
            flex: 1;
            padding: 18px;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        /* Official Brand Colors */
        .apple-pay { background: #ffffff; color: #000; }
        .google-pay { background: #2DA94F; color: #ffffff; }
        
        footer {
            padding: 20px;
            text-align: center;
            font-size: 10px;
            color: #555;
            width: 100%;
        }
        .socials { margin-top: 5px; color: #888; }
    </style>
</head>
<body>

    <div class="app-container">
        <img src="Zeros_Bill.jpg" id="bill" alt="Zeros Bill">
        
        <div class="button-group">
            <button class="pay-btn apple-pay" onclick="triggerPay('apple')">Apple Pay</button>
            <button class="pay-btn google-pay" onclick="triggerPay('google')">Google Pay</button>
        </div>
    </div>

    <footer>
        <strong>Zengine Platform, All Rights Reserved, 2026.</strong><br>
        No license, no copying, no distribution.<br>
        <div class="socials">
            Discord: https://discord.gg/Fde4nf2m | @DooBedder (IG/X/FB/YT/TikTok) | Twitch: @DooBedder
        </div>
    </footer>

    <script>
        function triggerPay(type) {
            const audio = new Audio(type + '.mp3');
            const bill = document.getElementById('bill');
            
            audio.play();
            bill.classList.add('success-glow');
            setTimeout(() => bill.classList.remove('success-glow'), 500);
            
            // Haptic Feedback for iPhone
            if (window.navigator.vibrate) {
                window.navigator.vibrate([10, 30, 10]);
            }
        }
    </script>
</body>
</html>
